name: Render CV to PDF

on:
  push:
    branches:
      - main
    paths:
      - "CV.html"
      - "resume.css"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render-to-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Convert CV.html to PDF
        uses: fifsky/html-to-pdf-action@master
        with:
          htmlFile: CV.html
          outputFile: CV.pdf
          pdfOptions: '{"format": "A4", "margin": {"top": "7mm", "left": "7mm", "right": "7mm", "bottom": "7mm"}, "scale": 0.95, "printBackground": true}'

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: CV
          path: CV.pdf

      - name: Commit and push CV.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add CV.pdf
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Auto-update CV.pdf"
          git pull --rebase
          git push
